<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="rotateWarning">
  Поверни телефон вертикально
</div>

<!-- ===== ИГРОВАЯ ПАНЕЛЬ ===== -->
<div id="upgradePanel">

  <div class="upgradeItem">
    <img id="engineImgPanel" src="assets/images/laps.png">
    <div class="price" id="enginePrice"></div>
  </div>

  <div class="upgradeItem">
    <img id="turboImgPanel" src="assets/images/turbo.png">
    <div class="price" id="turboPrice"></div>
  </div>

  <div class="upgradeItem">
    <img id="suspensionImgPanel" src="assets/images/podves.png">
    <div class="price" id="suspensionPrice"></div>
  </div>

  <div id="coinsUI">Coins: 0</div>
</div>

<button id="gasBtn">GAS</button>
<button id="openUpgradesBtn">UPGRADES</button>

<canvas id="gameCanvas"></canvas>

<!-- ===== ЭКРАН ГАРАЖА ===== -->
<div id="upgradeScreen" class="hidden">

  <button id="backBtn">←</button>

  <div class="miniUpgrades">

    <img id="engineImgScreen" src="assets/images/laps.png">
    <img id="turboImgScreen" src="assets/images/turbo.png">
    <img id="suspensionImgScreen" src="assets/images/podves.png">

  </div>

</div>
<script src="script.js"></script>
</body>
</html>
